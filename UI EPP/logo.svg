<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="cascoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2" />
      <stop offset="50%" stop-color="#ef4444" stop-opacity="1" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.2" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#090d16" rx="20"/>

  <g transform="translate(0, -15)">
    <path d="M 110,140 L 110,110 L 140,110" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 390,140 L 390,110 L 360,110" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 110,320 L 110,350 L 140,350" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 390,320 L 390,350 L 360,350" stroke="#1e293b" stroke-width="4" fill="none" stroke-linecap="round"/>

    <circle cx="250" cy="230" r="130" stroke="#1e293b" stroke-width="2" fill="none" stroke-dasharray="10 15" />
    <circle cx="250" cy="230" r="150" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.3" fill="none" />

    <path d="M 235,115 Q 250,95 265,115 L 260,160 L 240,160 Z" fill="url(#cascoGrad)" />
    
    <path d="M 150,220 C 150,140 210,120 250,120 C 290,120 350,140 350,220 C 350,230 340,235 330,235 L 170,235 C 160,235 150,230 150,220 Z" fill="url(#cascoGrad)" />
    
    <path d="M 140,225 L 360,225 C 370,225 375,235 360,242 C 330,255 250,255 140,242 C 125,235 130,225 140,225 Z" fill="#1d4ed8" />
    
    <path d="M 175,245 L 200,290 L 235,295 L 250,280 L 265,295 L 300,290 L 325,245" stroke="#334155" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <line x1="90" y1="210" x2="410" y2="210" stroke="url(#scanGrad)" stroke-width="4" filter="url(#glow)" stroke-linecap="round"/>
    <circle cx="90" cy="210" r="4" fill="#ef4444" filter="url(#glow)"/>
    <circle cx="410" cy="210" r="4" fill="#ef4444" filter="url(#glow)"/>
  </g>

  <text x="250" y="415" font-family="'Orbitron', 'Inter', sans-serif" font-size="34" font-weight="900" fill="#f8fafc" letter-spacing="6" text-anchor="middle">EPP SCANNER</text>
  <text x="250" y="445" font-family="'Inter', sans-serif" font-size="12" font-weight="600" fill="#64748b" letter-spacing="4" text-anchor="middle">SISTEMA DE DETECCIÓN IA</text>
</svg>
